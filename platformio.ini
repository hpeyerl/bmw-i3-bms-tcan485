; =============================================================================
; BMW i3 CSC BMS - LilyGo T-CAN485
; Target: ESP32 (original, dual-core Xtensa LX6), 4 MB flash, no PSRAM
; No display, no LVGL, no M5Stack libraries.
; CAN: TWAI peripheral via SN65HVD231 transceiver (pin_config.h)
; WiFi: AP mode, JSON status endpoint
; =============================================================================

[env:t_can485]
platform  = espressif32@6.5.0
framework = arduino
board     = esp32dev

; ---- Flash layout ----
board_build.flash_size  = 4MB
board_build.flash_mode  = dio
board_build.flash_freq  = 40m
board_build.f_cpu       = 240000000L
board_build.partitions  = min_spiffs.csv   ; 4 MB default (no OTA, maximises app space)

; ---- Build flags ----
build_flags =
    -DBOARD_TCAN485
    -DARDUINO_RUNNING_CORE=1
    -DARDUINO_EVENT_RUNNING_CORE=0
    -DCORE_DEBUG_LEVEL=0
    ; Disable USB CDC (T-CAN485 uses CH9102 USB-UART bridge, not native USB)
    -UARDUINO_USB_CDC_ON_BOOT

; ---- Upload & monitor ----
upload_protocol = esptool
upload_speed    = 921600
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, colorize, time

; ---- Libraries ----
lib_deps =
    fastled/FastLED                        @ ^3.7.0
    bblanchon/ArduinoJson                  @ ^7.3.1
    esphome/AsyncTCP-esphome               @ ^2.1.4
    esphome/ESPAsyncWebServer-esphome      @ ^3.3.0

lib_ldf_mode = deep+
