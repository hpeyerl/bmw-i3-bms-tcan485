; =============================================================================
; BMW i3 CSC BMS - LilyGo T-CAN485
; Target: ESP32 (original, dual-core Xtensa LX6), 4 MB flash, no PSRAM
; =============================================================================

[env:t_can485]
platform  = espressif32
framework = arduino
board     = esp32dev

; Tell PlatformIO all source files are in the project root (flat layout)
; This is needed because we use main.cpp + sibling .cpp files, not src/
src_dir   = .
include_dir = .

; ---- Flash layout ----
board_build.flash_size  = 4MB
board_build.flash_mode  = qio
board_build.flash_freq  = 80m
board_build.f_cpu       = 240000000L
board_build.partitions  = default.csv

; ---- Build flags ----
build_flags =
    -DBOARD_TCAN485
    -DARDUINO_RUNNING_CORE=1
    -DARDUINO_EVENT_RUNNING_CORE=0
    -DCORE_DEBUG_LEVEL=0
    -UARDUINO_USB_CDC_ON_BOOT

; ---- Upload & monitor ----
upload_protocol = esptool
upload_speed    = 921600
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, colorize, time

; ---- Libraries ----
lib_deps =
    fastled/FastLED                        @ ^3.7.0
    bblanchon/ArduinoJson                  @ ^7.3.1
    esphome/AsyncTCP-esphome               @ ^2.1.4
    esphome/ESPAsyncWebServer-esphome      @ ^3.3.0

lib_ldf_mode = deep+
